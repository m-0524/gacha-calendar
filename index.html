<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャガチャ発売日カレンダー（バンダイ）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --blue:#1e6fd9;
    --red:#e0392b;
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#dfe3ec;
    --text:#2b2f38;
    --muted:#8a90a0;
    --gold:#f5a623;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:linear-gradient(90deg,var(--blue),var(--red));
    color:#fff;
    padding:16px 24px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  header .icon{
    width:40px;height:40px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    flex-shrink:0;
  }
  header h1{font-size:18px;margin:0;font-weight:700;}
  header .sub{font-size:12px;opacity:.9;margin-top:2px;}

  .toolbar{
    max-width:1100px;
    margin:16px auto 0;
    padding:0 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .month-nav{
    display:flex;align-items:center;gap:10px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 14px;
  }
  .month-nav button{
    border:none;background:none;font-size:16px;cursor:pointer;
    color:var(--blue);padding:4px 8px;border-radius:6px;
  }
  .month-nav button:hover{background:#eef3fc;}
  .month-nav .label{font-size:16px;font-weight:700;min-width:110px;text-align:center;}
  .btn{
    border:none;border-radius:8px;padding:9px 16px;
    font-size:13px;font-weight:700;cursor:pointer;
  }
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{background:#c62a1e;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{background:#f0f2f7;}

  .layout{
    max-width:1100px;margin:16px auto 60px;padding:0 16px;
    display:grid;grid-template-columns:1fr 320px;gap:18px;
  }
  @media (max-width:820px){ .layout{grid-template-columns:1fr;} }

  .calendar{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;overflow:hidden;
  }
  .weekdays{
    display:grid;grid-template-columns:repeat(7,1fr);
    background:#f0f2f7;
    font-size:12px;font-weight:700;color:var(--muted);
  }
  .weekdays div{padding:8px 0;text-align:center;}
  .weekdays div:first-child{color:var(--red);}
  .weekdays div:last-child{color:var(--blue);}
  .grid{
    display:grid;grid-template-columns:repeat(7,1fr);
    grid-auto-rows:104px;
  }
  .cell{
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:6px;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    transition:background .1s;
  }
  .cell:hover{background:#f7f9fd;}
  .cell.other-month{background:#fafafc;color:#c7cad4;}
  .cell.today{background:#fff6e6;}
  .cell.selected{outline:2px solid var(--blue);outline-offset:-2px;}
  .cell .date-num{font-size:12px;font-weight:700;}
  .cell.today .date-num{
    background:var(--red);color:#fff;border-radius:50%;
    width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;
  }
  .thumbs{
    display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;
  }
  .thumbs img{
    width:26px;height:26px;object-fit:cover;border-radius:4px;
    border:1px solid var(--border);background:#fff;
  }
  .thumbs img.obtained{filter:grayscale(1);opacity:.6;}
  .thumbs .more{
    font-size:10px;color:var(--muted);align-self:center;
  }
  .wish-dot{
    position:absolute;top:4px;right:4px;color:var(--gold);font-size:12px;
  }

  .panel{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:16px;height:fit-content;
    position:sticky;top:16px;
  }
  .panel h2{font-size:14px;margin:0 0 4px;}
  .panel .panel-date{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .item-card{
    display:flex;gap:10px;border:1px solid var(--border);
    border-radius:10px;padding:10px;margin-bottom:10px;
    transition:opacity .15s, background .15s;
  }
  .item-card.obtained{
    opacity:.55;background:#f5f5f5;
  }
  .item-card img{
    width:64px;height:64px;object-fit:cover;border-radius:8px;
    background:#f0f2f7;flex-shrink:0;
  }
  .item-card.obtained img{filter:grayscale(1);}
  .item-info{flex:1;min-width:0;}
  .item-info .name{font-size:13px;font-weight:700;margin-bottom:2px;
    display:flex;align-items:center;gap:4px;}
  .item-info .series{font-size:11px;color:var(--muted);margin-bottom:2px;}
  .item-info .price{font-size:12px;color:var(--red);font-weight:700;}
  .item-actions{display:flex;gap:6px;margin-top:6px;}
  .item-actions button{
    font-size:11px;border:none;background:#f0f2f7;border-radius:6px;
    padding:3px 8px;cursor:pointer;color:var(--text);
  }
  .item-actions button:hover{background:#e4e8f2;}
  .star-btn{border:none;background:none;cursor:pointer;font-size:13px;color:#ccc;}
  .star-btn.active{color:var(--gold);}
  .get-btn{border:none;background:none;cursor:pointer;font-size:13px;color:#ccc;}
  .get-btn.active{color:#2a9d5c;}
  .empty-note{font-size:12px;color:var(--muted);text-align:center;padding:20px 0;}

  /* modal */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
    align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff;border-radius:14px;padding:22px;width:100%;max-width:420px;
    max-height:90vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{
    display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;
  }
  .field input[type=text],.field input[type=date],.field input[type=number],
  .field select,.field textarea{
    width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;
    font-size:13px;font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:50px;}
  .img-preview{
    width:80px;height:80px;object-fit:cover;border-radius:8px;
    border:1px solid var(--border);margin-top:6px;background:#f0f2f7;
  }
  .checkbox-row{display:flex;align-items:center;gap:6px;font-size:13px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

  .fab{
    position:fixed;right:24px;bottom:24px;
    width:52px;height:52px;border-radius:50%;
    background:var(--red);color:#fff;border:none;font-size:26px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);cursor:pointer;
    z-index:40;
  }
  .fab:hover{background:#c62a1e;}

  .undetermined-wrap{
    max-width:1100px;margin:0 auto 60px;padding:0 16px;
  }
  .undetermined-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:16px;
  }
  .undetermined-box h2{font-size:14px;margin:0 0 12px;}
  .undetermined-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:10px;
  }
</style>
</head>

<div class="toolbar">
  <div class="month-nav">
    <button id="prevMonth">◀</button>
    <div class="label" id="monthLabel"></div>
    <button id="nextMonth">▶</button>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-outline" id="todayBtn">今日</button>
    <button class="btn btn-outline" id="refreshBtn" title="ソースに登録されている最新の取込データに更新します（自分で追加・編集した商品はそのまま残ります）">🔄 最新データを再取得</button>
  </div>
</div>

<div class="layout">
  <div class="calendar">
    <div class="weekdays">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="panel">
    <h2 id="panelTitle">日付を選択してください</h2>
    <div class="panel-date" id="panelDate"></div>
    <div id="panelList"></div>
    <button class="btn btn-primary" style="width:100%" id="addForSelected">＋ この日に追加</button>
  </div>
</div>

<div class="undetermined-wrap">
  <div class="undetermined-box">
    <h2>発売日未定（<span id="undeterminedMonthLabel"></span>・月のみ判明分）</h2>
    <div class="undetermined-grid" id="undeterminedList"></div>
  </div>
</div>

<button class="fab" id="fabAdd" title="商品を追加">＋</button>

<!-- Add/Edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">商品を追加</h3>
    <div class="field">
      <label>商品名</label>
      <input type="text" id="f-name" placeholder="例：カプセルフィギュア ○○シリーズ">
    </div>
    <div class="field">
      <label>シリーズ名</label>
      <select id="f-series">
        <option value="サンリオキャラクターズ">サンリオキャラクターズ</option>
        <option value="たまごっち">たまごっち</option>
        <option value="パワーパフガールズ">パワーパフガールズ</option>
        <option value="カービィ">カービィ</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label>メーカー</label>
      <select id="f-maker">
        <option value="bandai">バンダイ</option>
        <option value="takaratomy">タカラトミーアーツ</option>
        <option value="ip4">IP4（アイピーフォー）</option>
        <option value="benelic">ベネリック</option>
        <option value="yumeya">夢屋</option>
        <option value="yell">YELL</option>
        <option value="keicompany">ケイカンパニー</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field checkbox-row">
      <input type="checkbox" id="f-undetermined">
      <label style="margin:0" for="f-undetermined">発売日未定（発売月のみ分かっている）</label>
    </div>
    <div class="field" id="f-date-field">
      <label>発売日</label>
      <input type="date" id="f-date">
    </div>
    <div class="field" id="f-month-field" style="display:none">
      <label>発売月</label>
      <input type="month" id="f-month">
    </div>
    <div class="field">
      <label>価格（円）</label>
      <input type="number" id="f-price" placeholder="例：400">
    </div>
    <div class="field">
      <label>画像URL（貼り付け）</label>
      <input type="text" id="f-imageurl" placeholder="https://...">
    </div>
    <div class="field">
      <label>画像ファイルを選択（端末から）</label>
      <input type="file" id="f-imagefile" accept="image/*">
      <img id="imgPreview" class="img-preview" style="display:none">
    </div>
    <div class="field">
      <label>商品ページリンク</label>
      <input type="text" id="f-link" placeholder="https://...">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="f-memo" placeholder="全N種、コンプ価格など"></textarea>
    </div>
    <div class="field checkbox-row">
      <input type="checkbox" id="f-wish">
      <label style="margin:0" for="f-wish">★ ウィッシュリストに入れる</label>
    </div>
    <div class="field checkbox-row">
      <input type="checkbox" id="f-obtained">
      <label style="margin:0" for="f-obtained">✔ ゲット済み</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

function loadItems(){
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}
function saveItems(items){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function seedIfNeeded(){
  if(localStorage.getItem(SEED_KEY)) return;
  const items = loadItems();
  saveItems(items);
  localStorage.setItem(SEED_KEY, '1');
}

function refreshLatestData(){
  const ok = confirm(
    '最新の取込データ（サンリオ・タカラトミーアーツ分）に更新します。\n\n' +
    '・自分で追加した商品や、編集した商品はそのまま残ります\n' +
    '・編集していない取込データは最新の内容に置き換わります\n' +
    '・古いサンプルデータは削除されます\n\n' +
    'よろしいですか？'
  );
  if(!ok) return;

  // sourceId（安定ID）と maker::name の両方をキーとして持たせ、
  // sourceIdを持たない旧バージョンのデータとも突き合わせられるようにする
  const matchKeys = (it) => it.sourceId ? [it.sourceId, `${it.maker}::${it.name}`] : [`${it.maker}::${it.name}`];
  const anyKeyIn = (it, keySet) => matchKeys(it).some(k => keySet.has(k));
  const addKeys = (it, keySet) => matchKeys(it).forEach(k => keySet.add(k));

  const fresh = allSeedBuilders();
  const freshKeys = new Set();
  fresh.forEach(it => addKeys(it, freshKeys));

  let current = loadItems();
  current = current.filter(it => !/^ガシャポン サンプル/.test(it.name));
  current = current.filter(it => {
    const isKnownSeed = it.seedSource || anyKeyIn(it, freshKeys);
    return !(isKnownSeed && !it.userEdited);
  });

  const remainingKeys = new Set();
  current.forEach(it => addKeys(it, remainingKeys));
  const toAdd = fresh.filter(it => !anyKeyIn(it, remainingKeys));

  items = current.concat(toAdd);
  saveItems(items);
  localStorage.setItem(SEED_KEY, '1');
  localStorage.setItem(SEED_KEY_SANRIO_V1, '1');
  localStorage.setItem(SEED_KEY_TAKARATOMY_V1, '1');

  renderCalendar();
  renderPanel();
  alert('最新データに更新しました。');
}

let items = [];
let viewYear, viewMonth; // 0-indexed month
let selectedDate = null; // 'YYYY-MM-DD'
let editingId = null;

function init(){
  seedIfNeeded();
  seedSanrioIfNeeded();
  seedTakaratomyIfNeeded();
  items = loadItems();
  const SERIES_OPTIONS = ['サンリオキャラクターズ','たまごっち','パワーパフガールズ','カービィ','その他'];
  let migrated = false;
  items.forEach(it => {
    if(!it.maker){ it.maker = 'bandai'; migrated = true; }
    if(!SERIES_OPTIONS.includes(it.series)){
      it.series = (it.series || '').includes('サンリオ') ? 'サンリオキャラクターズ' : 'その他';
      migrated = true;
    }
  });
  if(migrated) saveItems(items);
  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  selectedDate = today.toISOString().slice(0,10);
  renderCalendar();
  renderPanel();
}

function toDateStr(y,m,d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${viewYear}年 ${viewMonth+1}月`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

  const todayStr = new Date().toISOString().slice(0,10);

  const cells = [];
  // leading (prev month)
  for(let i=0;i<startWeekday;i++){
    const dayNum = daysInPrevMonth - startWeekday + i + 1;
    let y = viewYear, m = viewMonth - 1;
    if(m<0){m=11;y--;}
    cells.push({y,m,d:dayNum,other:true});
  }
  // this month
  for(let d=1; d<=daysInMonth; d++){
    cells.push({y:viewYear,m:viewMonth,d,other:false});
  }
  // trailing (next month) to fill full weeks
  while(cells.length % 7 !== 0){
    const idx = cells.length - (startWeekday + daysInMonth);
    let y = viewYear, m = viewMonth + 1;
    if(m>11){m=0;y++;}
    cells.push({y,m,d:idx+1,other:true});
  }

  cells.forEach(c => {
    const dateStr = toDateStr(c.y, c.m, c.d);
    const div = document.createElement('div');
    div.className = 'cell' + (c.other ? ' other-month' : '') +
      (dateStr === todayStr ? ' today' : '') +
      (dateStr === selectedDate ? ' selected' : '');
    div.dataset.date = dateStr;

    const dayItems = items.filter(it => it.releaseDate === dateStr);
    const hasWish = dayItems.some(it => it.wishlist);

    div.innerHTML = `
      <span class="date-num">${c.d}</span>
      ${hasWish ? '<span class="wish-dot">★</span>' : ''}
      <div class="thumbs">
        ${dayItems.slice(0,3).map(it => `<img class="${it.obtained ? 'obtained':''}" style="border-color:${makerInfo(it.maker).color}" src="${it.imageUrl || PLACEHOLDER_IMG}" referrerpolicy="no-referrer" title="${escapeHtml(it.name)}">`).join('')}
        ${dayItems.length > 3 ? `<span class="more">+${dayItems.length-3}</span>` : ''}
      </div>
    `;
    div.addEventListener('click', () => {
      selectedDate = dateStr;
      if(c.other){
        viewYear = c.y; viewMonth = c.m;
        renderCalendar();
      } else {
        document.querySelectorAll('.cell.selected').forEach(el=>el.classList.remove('selected'));
        div.classList.add('selected');
      }
      renderPanel();
    });
    grid.appendChild(div);
  });

  renderUndetermined();
}

function renderPanel(){
  const list = document.getElementById('panelList');
  const dateObj = new Date(selectedDate + 'T00:00:00');
  document.getElementById('panelTitle').textContent = '発売リスト';
  document.getElementById('panelDate').textContent =
    `${dateObj.getFullYear()}年${dateObj.getMonth()+1}月${dateObj.getDate()}日（${'日月火水木金土'[dateObj.getDay()]}）`;

  const dayItems = items.filter(it => it.releaseDate === selectedDate);
  if(dayItems.length === 0){
    list.innerHTML = '<div class="empty-note">この日の発売情報はありません</div>';
    return;
  }
  list.innerHTML = dayItems.map(itemCardHtml).join('');
  attachItemActionHandlers(list);
}

function itemCardHtml(it){
  return `
    <div class="item-card ${it.obtained ? 'obtained':''}" style="border-left:4px solid ${makerInfo(it.maker).color}">
      <img src="${it.imageUrl || PLACEHOLDER_IMG}" referrerpolicy="no-referrer">
      <div class="item-info">
        <div class="name">
          ${escapeHtml(it.name)}
          <button class="get-btn ${it.obtained ? 'active':''}" data-id="${it.id}" data-action="get" title="ゲット済み">✔</button>
          <button class="star-btn ${it.wishlist ? 'active':''}" data-id="${it.id}" data-action="wish">★</button>
        </div>
        <div class="series" style="color:${makerInfo(it.maker).color};font-weight:700">${escapeHtml(makerInfo(it.maker).label)}</div>
        <div class="series">${escapeHtml(it.series || '')}</div>
        ${it.price ? `<div class="price">¥${Number(it.price).toLocaleString()}</div>` : ''}
        ${it.releaseMonth && !it.releaseDate ? `<div class="series">発売月：${escapeHtml(it.releaseMonth)}（日付未定）</div>` : ''}
        ${it.memo ? `<div class="series">${escapeHtml(it.memo)}</div>` : ''}
        <div class="item-actions">
          ${it.link ? `<button data-action="link" data-id="${it.id}">リンク</button>` : ''}
          <button data-action="edit" data-id="${it.id}">編集</button>
          <button data-action="delete" data-id="${it.id}">削除</button>
        </div>
      </div>
    </div>
  `;
}

function attachItemActionHandlers(container){
  container.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const item = items.find(x => x.id === id);
      if(action === 'get'){
        item.obtained = !item.obtained;
        saveItems(items);
        renderCalendar(); renderPanel();
      } else if(action === 'wish'){
        item.wishlist = !item.wishlist;
        saveItems(items);
        renderCalendar(); renderPanel();
      } else if(action === 'edit'){
        openModal(item);
      } else if(action === 'delete'){
        if(confirm(`「${item.name}」を削除しますか？`)){
          items = items.filter(x => x.id !== id);
          saveItems(items);
          renderCalendar(); renderPanel();
        }
      } else if(action === 'link'){
        window.open(item.link, '_blank');
      }
    });
  });
}

function renderUndetermined(){
  document.getElementById('undeterminedMonthLabel').textContent = `${viewYear}年${viewMonth+1}月`;
  const monthStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const list = document.getElementById('undeterminedList');
  const undeterminedItems = items.filter(it => !it.releaseDate && it.releaseMonth === monthStr);
  if(undeterminedItems.length === 0){
    list.innerHTML = '<div class="empty-note">この月の発売日未定商品はありません</div>';
    return;
  }
  list.innerHTML = undeterminedItems.map(itemCardHtml).join('');
  attachItemActionHandlers(list);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- modal ---
const overlay = document.getElementById('overlay');
let pendingImageData = null;

function openModal(item){
  editingId = item ? item.id : null;
  document.getElementById('modalTitle').textContent = item ? '商品を編集' : '商品を追加';
  document.getElementById('f-name').value = item ? item.name : '';
  document.getElementById('f-series').value = item ? item.series : 'サンリオキャラクターズ';
  document.getElementById('f-maker').value = item ? (item.maker || 'bandai') : 'bandai';
  const isUndetermined = !!(item && !item.releaseDate && item.releaseMonth);
  document.getElementById('f-undetermined').checked = isUndetermined;
  document.getElementById('f-date').value = item ? (item.releaseDate || '') : selectedDate;
  document.getElementById('f-month').value = item && item.releaseMonth ? item.releaseMonth : '';
  document.getElementById('f-date-field').style.display = isUndetermined ? 'none' : 'block';
  document.getElementById('f-month-field').style.display = isUndetermined ? 'block' : 'none';
  document.getElementById('f-price').value = item ? item.price : '';
  document.getElementById('f-imageurl').value = item && item.imageUrl && !item.imageUrl.startsWith('data:') ? item.imageUrl : '';
  document.getElementById('f-link').value = item ? item.link : '';
  document.getElementById('f-memo').value = item ? item.memo : '';
  document.getElementById('f-wish').checked = item ? !!item.wishlist : false;
  document.getElementById('f-obtained').checked = item ? !!item.obtained : false;
  document.getElementById('f-imagefile').value = '';
  pendingImageData = item && item.imageUrl && item.imageUrl.startsWith('data:') ? item.imageUrl : null;
  const preview = document.getElementById('imgPreview');
  if(item && item.imageUrl){
    preview.src = item.imageUrl;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
  overlay.classList.add('show');
}
function closeModal(){
  overlay.classList.remove('show');
  editingId = null;
  pendingImageData = null;
}

document.getElementById('f-undetermined').addEventListener('change', (e) => {
  document.getElementById('f-date-field').style.display = e.target.checked ? 'none' : 'block';
  document.getElementById('f-month-field').style.display = e.target.checked ? 'block' : 'none';
});

document.getElementById('fabAdd').addEventListener('click', () => openModal(null));
document.getElementById('addForSelected').addEventListener('click', () => openModal(null));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

document.getElementById('f-imagefile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    pendingImageData = reader.result;
    const preview = document.getElementById('imgPreview');
    preview.src = pendingImageData;
    preview.style.display = 'block';
    document.getElementById('f-imageurl').value = '';
  };
  reader.readAsDataURL(file);
});
document.getElementById('f-imageurl').addEventListener('input', (e) => {
  if(e.target.value){
    pendingImageData = null;
    const preview = document.getElementById('imgPreview');
    preview.src = e.target.value;
    preview.style.display = 'block';
  }
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if(!name){
    alert('商品名は必須です');
    return;
  }
  const undetermined = document.getElementById('f-undetermined').checked;
  const date = undetermined ? '' : document.getElementById('f-date').value;
  const month = undetermined ? document.getElementById('f-month').value : '';
  if(undetermined && !month){
    alert('発売月を入力してください');
    return;
  }
  if(!undetermined && !date){
    alert('発売日を入力してください（未定の場合は「発売日未定」にチェック）');
    return;
  }
  const imageUrl = pendingImageData || document.getElementById('f-imageurl').value.trim() || '';

  const data = {
    name,
    series: document.getElementById('f-series').value.trim(),
    maker: document.getElementById('f-maker').value,
    releaseDate: undetermined ? null : date,
    releaseMonth: undetermined ? month : null,
    price: document.getElementById('f-price').value ? Number(document.getElementById('f-price').value) : null,
    imageUrl,
    link: document.getElementById('f-link').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    wishlist: document.getElementById('f-wish').checked,
    obtained: document.getElementById('f-obtained').checked
  };

  if(editingId){
    const idx = items.findIndex(x => x.id === editingId);
    items[idx] = {...items[idx], ...data, userEdited: true};
  } else {
    items.push({id: crypto.randomUUID(), ...data});
  }
  saveItems(items);
  if(!undetermined){
    selectedDate = date;
    viewYear = new Date(date).getFullYear();
    viewMonth = new Date(date).getMonth();
  } else {
    const [my, mm] = month.split('-').map(Number);
    viewYear = my;
    viewMonth = mm - 1;
  }
  closeModal();
  renderCalendar();
  renderPanel();
});

document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;}
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;}
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  selectedDate = today.toISOString().slice(0,10);
  renderCalendar();
  renderPanel();
});
document.getElementById('refreshBtn').addEventListener('click', refreshLatestData);

init();
</script>
</body>
</html>
